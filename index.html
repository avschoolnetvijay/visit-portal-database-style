                                </div>
                            </div>
                            <button onClick={() => exportToExcel(item.src, item.f)} className="w-full bg-teal-600 text-white text-xs font-bold py-2 rounded hover:bg-teal-700">
                                DOWNLOAD EXCEL
                            </button>
                        </div>
                    ))}

                    <div className="portal-card h-auto p-4 hover:shadow-md transition">
                        <div className="flex items-center gap-3 mb-3">
                            <div className="p-2 bg-purple-50 rounded text-purple-600"><Icons.Users className="w-6 h-6" /></div>
                            <div>
                                <h3 className="font-bold text-gray-700 text-sm">Team Wise Target Report</h3>
                                <p className="text-xs text-gray-500">Detailed target vs achievement list per visitor & school.</p>
                            </div>
                        </div>
                        <button onClick={() => exportToExcel(teamReport, 'Team_Target_Raw_Data')} className="w-full bg-purple-600 text-white text-xs font-bold py-2 rounded hover:bg-purple-700">
                            DOWNLOAD EXCEL
                        </button>
                    </div>
                </div>
            );
        };

        const Setup = ({ onUpload, onReset, status, onGoogleFetch, googleLoading }) => (
            <div className="max-w-4xl mx-auto p-6 animate-fade-in">
                <div className="portal-card">
                    <div className="portal-card-header text-sm py-2">System Setup & Data Import</div>
                    <div className="p-8 text-center bg-white">
                        <Icons.Setup className="w-12 h-12 text-teal-600 mx-auto mb-4" />
                        <p className="text-gray-500 mb-6 text-xs">Upload your Excel files to populate the portal. Data is stored locally in your browser.</p>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="border border-dashed border-gray-300 rounded p-6 hover:border-teal-500 bg-gray-50 transition relative">
                                <div className="font-bold text-teal-700 mb-2 text-xs uppercase">1. School Master Data</div>
                                <input type="file" onChange={(e) => onUpload(e, 'schools')} accept=".xlsx" className="text-xs w-full cursor-pointer" />

                                <div className="mt-4 pt-4 border-t border-gray-100">
                                    <button
                                        onClick={onGoogleFetch}
                                        disabled={googleLoading}
                                        className="w-full bg-blue-50 text-blue-700 text-xs font-bold py-2 rounded border border-blue-200 hover:bg-blue-100 flex items-center justify-center gap-2"
                                    >
                                        {googleLoading ? (
                                            <span>Fetching...</span>
                                        ) : (
                                            <>
                                                <Icons.GoogleSheet className="w-4 h-4" /> Auto-Fetch from Google Sheet
                                            </>
                                        )}
                                    </button>
                                </div>
                            </div>
                            <div className="border border-dashed border-gray-300 rounded p-6 hover:border-cyan-500 bg-gray-50 transition">
                                <div className="font-bold text-cyan-700 mb-2 text-xs uppercase">2. Visit Reports</div>
                                <input type="file" onChange={(e) => onUpload(e, 'visits')} accept=".xlsx" className="text-xs w-full cursor-pointer" />

                                <div className="mt-4 pt-4 border-t border-gray-100 text-center">
                                    <button
                                        onClick={onUpload} // Handled by parent
                                        className="w-full bg-teal-50 text-teal-700 text-xs font-bold py-2 rounded border border-teal-200 hover:bg-teal-100 flex items-center justify-center gap-2"
                                    >
                                        <Icons.Visit className="w-4 h-4" /> Sync from JHPMS (Netlify)
                                    </button>
                                </div>


                            </div>
                        </div>
                    </div>
                    <div className="bg-gray-50 p-3 border-t border-gray-200 flex justify-between items-center">
                        <div className="text-xs text-gray-600 font-medium">
                            <span className={status.schools ? "text-green-600" : "text-red-500"}>● Schools: {status.schools}</span>
                            <span className="mx-2">|</span>
                            <span className={status.visits ? "text-green-600" : "text-red-500"}>● Visits: {status.visits}</span>
                        </div>
                        <button onClick={onReset} className="text-red-600 text-xs font-bold hover:bg-red-50 px-3 py-1 rounded border border-red-200 transition">CLEAR DATA</button>
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [activeTab, setActiveTab] = useState('setup');
            const [schools, setSchools] = useState([]);
            const [visits, setVisits] = useState([]);
            const [drillDownData, setDrillDownData] = useState(null);

            const GOOGLE_API_KEY = 'AIzaSyCUq2G9jzCG3oX04UD74ogSD1Dda8obb5E';
            const GOOGLE_SHEET_ID = '1OQx2wLQo2XNrEpL0EbgmUqFpGgutByzKc-1eL0O9l7w';
            const TARGET_GID = '1188942420';
            const [googleLoading, setGoogleLoading] = useState(false);

            const [startDate, setStartDate] = useState(new Date(new Date().getFullYear(), new Date().getMonth(), 1).toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [selProjects, setSelProjects] = useState([]);
            const [selDistricts, setSelDistricts] = useState([]);
            const [selBlocks, setSelBlocks] = useState([]);
            const [selSchools, setSelSchools] = useState([]);

            useEffect(() => {
                const s = localStorage.getItem('schools');
                const v = localStorage.getItem('visits');
                if (s) setSchools(JSON.parse(s));
                if (v) setVisits(JSON.parse(v));
                if (s && v) setActiveTab('dashboard');
                else setActiveTab('setup');
            }, []);

            const processedData = useMemo(() => {
                const start = new Date(startDate);
                const end = new Date(endDate);
                end.setHours(23, 59, 59, 999);
                const months = getMonthsInRange(start, end);

                let fSchools = schools;
                if (selProjects.length) fSchools = fSchools.filter(s => selProjects.includes(s.project_name));
                if (selDistricts.length) fSchools = fSchools.filter(s => selDistricts.includes(s.district));
                if (selBlocks.length) fSchools = fSchools.filter(s => selBlocks.includes(s.block));
                if (selSchools.length) fSchools = fSchools.filter(s => selSchools.includes(s.school_name));

                const validUdise = new Set(fSchools.map(s => String(s.udise_code)));
                const fVisits = visits.filter(v => {
                    const d = new Date(v.visit_date);
                    return d >= start && d <= end && validUdise.has(String(v.udise_code));
                });

                const metrics = {};
                const today = new Date();
                fSchools.forEach(s => {
                    metrics[s.udise_code] = {
                        ...s, uniqueVisits: 0, visitDates: new Set(), totalRecords: 0, lastVisit: null, smartRecords: 0, ictRecords: 0
                    };
                });

                fVisits.forEach(v => {
                    if (metrics[v.udise_code]) {
                        const m = metrics[v.udise_code];
                        m.totalRecords++;
                        m.visitDates.add(v.visit_date.split('T')[0]);
                        const dObj = new Date(v.visit_date);
                        if (!m.lastVisit || dObj > new Date(m.lastVisit)) m.lastVisit = v.visit_date;

                        const type = (v.visit_type || "").toLowerCase();
                        if (type.includes('smart')) m.smartRecords++;
                        if (type.includes('ict')) m.ictRecords++;
                    }
                });

                const finalSchools = Object.values(metrics).map(s => {
                    const unique = s.visitDates.size;
                    const target = (s.monthly_target || 1) * months;
                    const daysSince = s.lastVisit ? Math.floor((today - new Date(s.lastVisit)) / (1000 * 60 * 60 * 24)) : 999;

                    const dateArr = Array.from(s.visitDates).sort();
                    const formattedDates = dateArr.map(d => {
                        const parts = d.split('-');
                        return `${parts[2]}-${parts[1]}-${parts[0]}`;
                    }).join(', ');

                    return {
                        ...s,
                        uniqueVisits: unique,
                        targetVisits: target,
                        engagement: calculateEngagement(unique, target, daysSince),
                        status: calculateStatus(unique, target),
                        lastVisit: s.lastVisit,
                        formattedDates: formattedDates
                    };
                });

                return {
                    schools: finalSchools,
                    visits: fVisits,
                    months,
                    totalTarget: finalSchools.reduce((a, b) => a + b.targetVisits, 0),
                    totalUnique: finalSchools.reduce((a, b) => a + b.uniqueVisits, 0),
                    totalRecords: fVisits.length
                };
            }, [schools, visits, startDate, endDate, selProjects, selDistricts, selBlocks, selSchools]);


            const fetchFromGoogleSheet = async () => {
                setGoogleLoading(true);
                try {
                    const metaUrl = `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SHEET_ID}?key=${GOOGLE_API_KEY}`;
                    const metaRes = await fetch(metaUrl);
                    if (!metaRes.ok) throw new Error("Failed to fetch sheet metadata");
                    const metaData = await metaRes.json();

                    const targetSheet = metaData.sheets.find(s => String(s.properties.sheetId) === TARGET_GID);
                    if (!targetSheet) throw new Error("Target Sheet GID not found");
                    const sheetTitle = targetSheet.properties.title;

                    const dataUrl = `https://sheets.googleapis.com/v4/spreadsheets/${GOOGLE_SHEET_ID}/values/${encodeURIComponent(sheetTitle)}!A:Z?key=${GOOGLE_API_KEY}`;
                    const dataRes = await fetch(dataUrl);
                    if (!dataRes.ok) throw new Error("Failed to fetch sheet data");
                    const sheetData = await dataRes.json();

                    if (!sheetData.values || sheetData.values.length < 2) {
                        alert("No data found in the sheet.");
                        return;
                    }

                    const headers = sheetData.values[0];
                    const rows = sheetData.values.slice(1);

                    const normalized = rows.map(row => {
                        const newRow = {};
                        headers.forEach((h, idx) => {
                            let nk = h.trim().toLowerCase().replace(/ /g, '_').replace(/[\r\n]+/g, "");
                            if (nk.includes('udise')) nk = 'udise_code';
                            if (nk.includes('project')) nk = 'project_name';
                            if (nk.includes('visit') && nk.includes('type')) nk = 'visit_type';
                            newRow[nk] = row[idx] !== undefined ? row[idx] : "";
                        });
                        if (!newRow.monthly_target) newRow.monthly_target = newRow.monthly_visit_target || 1;
                        return newRow;
                    });

                    setSchools(normalized);
                    localStorage.setItem('schools', JSON.stringify(normalized));
                    alert(`Successfully imported ${normalized.length} schools from Google Sheet!`);

                } catch (error) {
                    console.error(error);
                    alert("Error fetching Google Sheet: " + error.message);
                } finally {
                    setGoogleLoading(false);
                }
            };



            const handleUpload = (e, type) => {
                if (type === undefined && e.type === 'click') {
                    fetchJhpmsData();
                    return;
                }
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const wb = XLSX.read(evt.target.result, { type: 'binary' });
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);

                    const normalized = data.map(row => {
                        const newRow = {};
                        Object.keys(row).forEach(k => {
                            let nk = k.trim().toLowerCase().replace(/ /g, '_').replace(/[\r\n]+/g, "");
                            if (nk.includes('udise')) nk = 'udise_code';
                            if (nk.includes('project')) nk = 'project_name';
                            if (nk.includes('visit') && nk.includes('type')) nk = 'visit_type';
                            newRow[nk] = row[k];
                        });
                        if (newRow.visit_type) newRow.visit_type = newRow.visit_type.toString().trim();
                        if (type === 'schools' && !newRow.monthly_target) newRow.monthly_target = newRow.monthly_visit_target || 1;

                        // DATE FIX APPLIED HERE
                        if (type === 'visits') {
                            const pd = parseDateRobust(newRow.visit_date);
                            if (pd) {
                                // Construct YYYY-MM-DD manually using local time to prevent Timezone shift
                                const year = pd.getFullYear();
                                const month = String(pd.getMonth() + 1).padStart(2, '0');
                                const day = String(pd.getDate()).padStart(2, '0');
                                // Force T00:00:00 to keep standard format without shifting the day
                                newRow.visit_date = `${year}-${month}-${day}T00:00:00`;
                            }
                        }
                        return newRow;
                    }).filter(r => type === 'schools' || r.visit_date);

                    if (type === 'schools') {
                        setSchools(normalized);
                        localStorage.setItem('schools', JSON.stringify(normalized));
                    } else {
                        setVisits(normalized);
                        localStorage.setItem('visits', JSON.stringify(normalized));
                        // Auto-fill Dates Logic
                        if (normalized.length > 0) {
                            const dates = normalized.map(v => new Date(v.visit_date)).filter(d => !isNaN(d)).sort((a, b) => a - b);
                            if (dates.length > 0) {
                                setStartDate(dates[0].toISOString().split('T')[0]);
                                setEndDate(dates[dates.length - 1].toISOString().split('T')[0]);
                            }
                        }
                    }
                };
                reader.readAsBinaryString(file);
            };

            const opts = useMemo(() => {
                const proj = [...new Set(schools.map(s => s.project_name))].filter(x => x).sort();
                const filteredByProj = schools.filter(s => selProjects.length === 0 || selProjects.includes(s.project_name));
                const dist = [...new Set(filteredByProj.map(s => s.district))].filter(x => x).sort();
                const filteredByDist = filteredByProj.filter(s => selDistricts.length === 0 || selDistricts.includes(s.district));
                const blocks = [...new Set(filteredByDist.map(s => s.block))].filter(x => x).sort();
                const filteredByBlocks = filteredByDist.filter(s => selBlocks.length === 0 || selBlocks.includes(s.block));
                const schoolNames = [...new Set(filteredByBlocks.map(s => s.school_name))].filter(x => x).sort();
                return { proj, dist, blocks, schoolNames };
            }, [schools, selProjects, selDistricts, selBlocks]);

            const renderContent = () => {
                if (activeTab === 'setup') return <Setup onUpload={handleUpload} onReset={() => { localStorage.clear(); setSchools([]); setVisits([]); window.location.reload(); }} status={{ schools: schools.length, visits: visits.length }} onGoogleFetch={fetchFromGoogleSheet} googleLoading={googleLoading} />;

                if (activeTab === 'dashboard') {
                    if (!schools.length) return <div className="p-10 text-center text-gray-500">Please go to Setup and upload data first.</div>;
                    return (
                        <Dashboard
                            data={processedData}
                            onDrillDown={(t, d) => setDrillDownData({ title: t, data: d })}
                            startDate={startDate}
                            endDate={endDate}
                        />
                    );
                }
                if (activeTab === 'search') {
                    return (
                        <SearchView
                            schools={processedData.schools}
                            visits={visits}
                            startDate={startDate}
                            endDate={endDate}
                            onDrillDown={(t, d) => setDrillDownData({ title: t, data: d })}
                        />
                    );
                }
                if (activeTab === 'performance') return <PerformanceView data={processedData} />;
                if (activeTab === 'plan') return <PlanView data={processedData} />;
                if (activeTab === 'compliance') return <ComplianceView data={processedData} />;
                if (activeTab === 'reports') return <ReportsView data={processedData} />;

                return <div className="p-10 text-center text-gray-500">Module under development</div>;
            };

            return (
                <div className="flex h-screen overflow-hidden text-gray-800 text-sm selection:bg-teal-100 selection:text-teal-900">
                    <DrillDownModal isOpen={!!drillDownData} onClose={() => setDrillDownData(null)} title={drillDownData?.title} data={drillDownData?.data || []} />

                    <div className="w-64 portal-sidebar flex flex-col z-20 m-3 rounded-2xl border border-white/10 shadow-2xl shrink-0 transition-all duration-300">
                        <div className="p-5 border-b border-white/10 flex items-center gap-3">
                            <div className="bg-white/10 text-white p-2.5 rounded-lg shadow-inner backdrop-blur-md font-bold text-xs ring-1 ring-white/20">PMS</div>
                            <div>
                                <div className="font-bold text-white tracking-tight text-base shadow-black drop-shadow-md">Visit Portal</div>
                                <div className="text-[10px] text-teal-200 uppercase tracking-widest font-semibold">Admin Console</div>
                            </div>
                        </div>
                        <nav className="flex-1 overflow-y-auto py-4 space-y-1 px-2">
                            {[
                                { id: 'dashboard', l: 'Dashboard', i: Icons.Dashboard },
                                { id: 'search', l: 'Search & Insights', i: Icons.GlobalSearch },
                                { id: 'setup', l: 'System Setup', i: Icons.Setup },
                                { id: 'performance', l: 'Performance Matrix', i: Icons.Performance },
                                { id: 'plan', l: 'Visit Planning', i: Icons.Plan },
                                { id: 'compliance', l: 'Compliance Check', i: Icons.Compliance },
                                { id: 'reports', l: 'Reports & Export', i: Icons.Reports },
                            ].map(t => (
                                <button key={t.id} onClick={() => setActiveTab(t.id)} className={`w-full nav-item group ${activeTab === t.id ? 'active' : ''}`}>
                                    <span className={`mr-3 p-1.5 rounded-md transition-colors ${activeTab === t.id ? 'bg-teal-900/20 text-teal-800' : 'bg-white/10 text-teal-100 group-hover:bg-white/20'}`}>
                                        <t.i className="w-4 h-4" />
                                    </span>
                                    {t.l}
                                    {activeTab === t.id && <span className="ml-auto w-1.5 h-1.5 rounded-full bg-teal-600 animate-pulse"></span>}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-white/10 text-[10px] text-teal-200/60 text-center font-medium">
                            v2.1 • Glass Edition<br />Made with ❤️ by Schoolnet
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col overflow-hidden relative my-3 mr-3 rounded-2xl bg-white/60 backdrop-blur-md border border-white/60 shadow-xl">

                        {activeTab !== 'search' && activeTab !== 'setup' && (
                            <div className="portal-filter-bar z-10 mx-4 mt-4 rounded-xl border border-white shadow-sm flex flex-col gap-2">
                                <div className="flex justify-between items-center mb-1">
                                    <h2 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                                        <span className="w-1 h-6 bg-teal-600 rounded-full"></span>
                                        {activeTab.charAt(0).toUpperCase() + activeTab.slice(1)} View
                                    </h2>
                                    <div className="flex gap-2">
                                        <button className="bg-white border border-gray-200 text-gray-600 px-3 py-1.5 rounded-lg hover:bg-gray-50 flex items-center gap-2 shadow-sm transition-all hover:-translate-y-0.5 text-xs font-bold">
                                            <Icons.Search className="w-3.5 h-3.5" /> Advanced Search
                                        </button>
                                        <button className="bg-teal-600 text-white px-3 py-1.5 rounded-lg hover:bg-teal-700 flex items-center gap-2 shadow-md shadow-teal-200 transition-all hover:-translate-y-0.5 text-xs font-bold">
                                            <Icons.Export className="w-3.5 h-3.5" /> Export View
                                        </button>
                                    </div>
                                </div>
                                <div className="h-px bg-gray-200/80 w-full my-1"></div>
                                <div className="flex flex-wrap gap-3 items-end">
                                    <div className="w-44">
                                        <span className="portal-label">Agency</span>
                                        <select className="portal-input bg-gray-50 cursor-not-allowed opacity-70" disabled>
                                            <option>Schoolnet India Limited</option>
                                        </select>
                                    </div>
                                    <div className="w-36">
                                        <MultiSelect label="Projects" options={opts.proj} value={selProjects} onChange={setSelProjects} placeholder="All Projects" />
                                    </div>
                                    <div className="w-36">
                                        <MultiSelect label="District" options={opts.dist} value={selDistricts} onChange={setSelDistricts} placeholder="All Districts" />
                                    </div>
                                    <div className="w-36">
                                        <MultiSelect label="Block" options={opts.blocks} value={selBlocks} onChange={setSelBlocks} placeholder="All Blocks" />
                                    </div>
                                    <div className="w-44">
                                        <MultiSelect label="School" options={opts.schoolNames} value={selSchools} onChange={setSelSchools} placeholder="All Schools" />
                                    </div>
                                    <div className="w-auto flex items-end gap-2 bg-gray-50 p-1.5 rounded-lg border border-gray-200 ml-auto">
                                        <div>
                                            <span className="portal-label text-[10px] mb-0.5 ml-1">Date Range</span>
                                            <div className="flex items-center gap-1">
                                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)} className="portal-input h-7 w-28 text-xs" />
                                                <span className="text-gray-400">-</span>
                                                <input type="date" value={endDate} onChange={e => setEndDate(e.target.value)} className="portal-input h-7 w-28 text-xs" />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        <main className="flex-1 overflow-y-auto p-4 scroll-smooth">
                            {renderContent()}
                        </main>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
